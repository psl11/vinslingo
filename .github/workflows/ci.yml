name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancela ejecuciones anteriores del mismo ref cuando llega una nueva (p.ej.
# varios push seguidos a una misma PR): no tiene sentido gastar minutos de
# runner en commits ya superados.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Mínimo privilegio: el job solo lee el código, no escribe nada en el repo.
permissions:
  contents: read

jobs:
  test:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --ci
